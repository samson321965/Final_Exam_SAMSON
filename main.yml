name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node api.js &

      - name: Wait for server
        run: sleep 3

      - name: Test EndPoint Presentation
        run: curl -f http://localhost:3000/presentation

      - name: Test EndPoint Correction
        run: curl -f http://localhost:3000/correction
            
      - name: Stop server
        run: pkill node
